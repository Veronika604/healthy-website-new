<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Регистрация | Veronika_health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Навигация -->
  <header class="nav solid" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <svg class="logo-mark" viewBox="0 0 40 40" fill="none">
          <line x1="20" y1="4" x2="20" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="20" cy="3.5" r="2" fill="currentColor"/>
          <rect x="7" y="10" width="26" height="20" rx="7" stroke="currentColor" stroke-width="2" fill="none"/>
          <circle cx="15" cy="20" r="2.2" fill="currentColor"/>
          <circle cx="25" cy="20" r="2.2" fill="currentColor"/>
          <path d="M16 25.5 Q20 27 24 25.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          <line x1="13" y1="30" x2="13" y2="34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="27" y1="30" x2="27" y2="34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Veronika_health
      </a>
    </div>
  </header>

  <section class="form-page">
    <div class="form-page-bg"></div>
    <div class="form-page-letter">V</div>

    <div class="form-card">
      <div class="form-step">
        <span>Шаг 1 из 2</span>
        <div class="form-step-bar">
          <span class="active"></span>
          <span></span>
        </div>
      </div>

      <h1>Давай <em>знакомиться</em></h1>
      <p class="sub">Как тебя зовут и на какую почту отправлять план?</p>

      <form id="registerForm">
        <div class="form-field">
          <label for="username">Имя</label>
          <input type="text" id="username" name="username" placeholder="Например, Аня" required>
        </div>

        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <button type="submit" class="btn btn-primary btn-large form-submit">Продолжить</button>
      </form>

      <a href="index.html" class="form-back">На главную</a>
    </div>
  </section>

  <script>
    // Если пользователь уже был — подставим данные
    const existing = JSON.parse(localStorage.getItem('userData') || '{}');
    if (existing.username) document.getElementById('username').value = existing.username;
    if (existing.email)    document.getElementById('email').value    = existing.email;

    // Сохранение и переход на анкету
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      if (!username || !email) { alert('Заполни все поля'); return; }

      const userData = {
        ...existing,
        username, email,
        registeredAt: existing.registeredAt || new Date().toISOString()
      };
      localStorage.setItem('userData', JSON.stringify(userData));
      window.location.href = 'form.html';
    });
  </script>
</body>
</html>
