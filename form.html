<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Анкета | Veronika_health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="nav solid" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <svg class="logo-mark" viewBox="0 0 40 40" fill="none">
          <line x1="20" y1="4" x2="20" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="20" cy="3.5" r="2" fill="currentColor"/>
          <rect x="7" y="10" width="26" height="20" rx="7" stroke="currentColor" stroke-width="2" fill="none"/>
          <circle cx="15" cy="20" r="2.2" fill="currentColor"/>
          <circle cx="25" cy="20" r="2.2" fill="currentColor"/>
          <path d="M16 25.5 Q20 27 24 25.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          <line x1="13" y1="30" x2="13" y2="34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="27" y1="30" x2="27" y2="34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Veronika_health
      </a>
    </div>
  </header>

  <section class="form-page">
    <div class="form-page-bg"></div>
    <div class="form-page-letter">О</div>

    <div class="form-card" style="max-width: 560px;">
      <div class="form-step">
        <span>Шаг 2 из 2</span>
        <div class="form-step-bar">
          <span class="active"></span>
          <span class="active"></span>
        </div>
      </div>

      <h1>Расскажи <em>о себе</em></h1>
      <p class="sub">Эти данные нужны чтобы подобрать меню и план тренировок.</p>

      <form id="questionnaireForm">
        <div class="form-row">
          <div class="form-field">
            <label for="height">Рост (см)</label>
            <input type="number" id="height" name="height" placeholder="170" required min="100" max="250">
          </div>
          <div class="form-field">
            <label for="weight">Вес (кг)</label>
            <input type="number" id="weight" name="weight" placeholder="65" required min="30" max="300">
          </div>
        </div>

        <div class="form-field">
          <label for="activity">Уровень активности</label>
          <select id="activity" name="activity" required>
            <option value="">Выбери...</option>
            <option value="low">Низкая — сидячая работа</option>
            <option value="medium">Средняя — пару тренировок в неделю</option>
            <option value="high">Высокая — почти каждый день</option>
          </select>
        </div>

        <div class="form-field">
          <label for="goal">Цель</label>
          <select id="goal" name="goal" required>
            <option value="">Выбери...</option>
            <option value="lose">Похудеть</option>
            <option value="maintain">Поддерживать вес</option>
            <option value="gain">Набрать вес</option>
          </select>
        </div>

        <div class="form-field">
          <label for="diet">Тип питания</label>
          <select id="diet" name="diet" required>
            <option value="">Выбери...</option>
            <option value="normal">Обычное питание</option>
            <option value="vegan">Веган</option>
            <option value="vegetarian">Вегетарианец</option>
            <option value="pescetarian">Пескетарианец</option>
            <option value="glutenfree">Безглютеновое</option>
            <option value="keto">Кето</option>
          </select>
        </div>

        <div class="form-field">
          <label for="goal_weight">Целевой вес (кг) — необязательно</label>
          <input type="number" id="goal_weight" name="goal_weight" placeholder="60">
        </div>

        <div class="form-field">
          <label for="allergies">Аллергии — необязательно</label>
          <input type="text" id="allergies" name="allergies" placeholder="молоко, глютен, рыба…">
        </div>

        <div class="form-field">
          <label for="favorite_foods">Любимые продукты — необязательно</label>
          <input type="text" id="favorite_foods" name="favorite_foods" placeholder="авокадо, киноа, ягоды…">
        </div>

        <button type="submit" class="btn btn-primary btn-large form-submit">Сохранить и получить план</button>
      </form>

      <a href="register.html" class="form-back">Назад</a>
    </div>
  </section>

  <script>
    // Проверка, что пользователь зарегистрирован
    const user = JSON.parse(localStorage.getItem('userData') || '{}');
    if (!user.username) {
      alert('Сначала зарегистрируйся');
      window.location.href = 'register.html';
    }

    // Подставить прошлые ответы, если есть
    window.addEventListener('DOMContentLoaded', () => {
      ['height','weight','activity','goal','diet','goal_weight','allergies','favorite_foods']
        .forEach(name => {
          if (user[name] !== undefined && user[name] !== '') {
            const el = document.getElementById(name);
            if (el) el.value = user[name];
          }
        });
    });

    // Сохранение анкеты
    document.getElementById('questionnaireForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const answers  = {};
      for (const [k, v] of formData.entries()) answers[k] = v.trim();

      const prev = JSON.parse(localStorage.getItem('userData') || '{}');
      const updated = {
        ...prev,
        ...answers,
        questionnaireFilledAt: new Date().toISOString()
      };
      localStorage.setItem('userData', JSON.stringify(updated));
      localStorage.removeItem('currentMenu'); // сбросить выбор меню

      window.location.href = 'menu.html';
    });
  </script>
</body>
</html>
